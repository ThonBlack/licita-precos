<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="fundo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- fundo -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#fundo)"/>

  <!-- grade sutil -->
  <g stroke="#ffffff" stroke-opacity="0.16" stroke-width="4" stroke-linecap="round">
    <line x1="44" y1="92" x2="212" y2="92"/>
    <line x1="44" y1="134" x2="212" y2="134"/>
    <line x1="44" y1="176" x2="212" y2="176"/>
  </g>

  <!-- linha de preço descendo -->
  <polyline
    points="48,78 92,118 124,100 164,150 194,176"
    fill="none" stroke="#ffffff" stroke-width="19"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- halo + ponto do menor preço -->
  <circle cx="194" cy="176" r="30" fill="#ffffff" fill-opacity="0.30"/>
  <circle cx="194" cy="176" r="17" fill="#fbbf24" stroke="#ffffff" stroke-width="7"/>
</svg>
