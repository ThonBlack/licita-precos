appId: com.thonblack.licitaprecos
productName: LicitaPrecos
directories:
  output: release
files:
  - '!src/*'
  - '!scripts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.gitignore,README.md,pnpm-lock.yaml,.npmrc,tsconfig.json,electron-builder.yml}'
asarUnpack:
  - '**/*.node'
# better-sqlite3 usa prebuild oficial p/ Electron (scripts/native.mjs); sem Visual Studio na máquina
npmRebuild: false
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: LicitaPreços
publish:
  provider: github
  owner: ThonBlack
  repo: licita-precos
